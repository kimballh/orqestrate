version = 1
active_profile = "local"

[paths]
state_dir = ".harness/state"
data_dir = ".harness/data"
log_dir = ".harness/logs"

[policy]
max_concurrent_runs = 4
max_runs_per_provider = 2
allow_mixed_providers = true
default_phase_timeout_sec = 5400

[prompts]
root = "./prompts"
active_pack = "default"
invariants = [
  "invariants/run-scope.md",
  "invariants/authority-boundaries.md",
  "invariants/verification.md",
  "invariants/blockers.md",
]

[prompt_capabilities."github.read_pr"]
authority = "execution_surface_read"
provider = "github"
surface = "pull_request"
effect = "read"
target_scope = "linked_pull_request"
allowed_phases = ["implement", "review"]
allowed_roles = ["implement", "review"]
required_context = ["pull_request_url"]

[prompt_capabilities."github.push_branch"]
authority = "execution_surface_write"
provider = "github"
surface = "branch"
effect = "write"
target_scope = "assigned_branch"
allowed_phases = ["implement"]
allowed_roles = ["implement"]
required_context = ["assigned_branch", "write_scope"]

[prompt_capabilities."github.create_pr"]
authority = "execution_surface_write"
provider = "github"
surface = "pull_request"
effect = "write"
target_scope = "pull_request_for_assigned_branch"
allowed_phases = ["implement"]
allowed_roles = ["implement"]
required_context = ["assigned_branch", "write_scope"]

[prompt_capabilities."github.reply_review_thread"]
authority = "execution_surface_write"
provider = "github"
surface = "review_thread"
effect = "write"
target_scope = "linked_pull_request"
allowed_phases = ["implement"]
allowed_roles = ["implement"]
required_context = ["pull_request_url", "write_scope"]

[prompt_capabilities."github.resolve_review_thread"]
authority = "execution_surface_write"
provider = "github"
surface = "review_thread"
effect = "state_transition"
target_scope = "linked_pull_request"
allowed_phases = ["implement"]
allowed_roles = ["implement"]
required_context = ["pull_request_url", "write_scope"]

[prompt_capabilities."github.write_review"]
authority = "execution_surface_write"
provider = "github"
surface = "review_submission"
effect = "write"
target_scope = "linked_pull_request"
allowed_phases = ["review"]
allowed_roles = ["review"]
required_context = ["pull_request_url", "write_scope"]

[prompt_capabilities.playwright_exploration]
authority = "behavioral"
allowed_phases = ["implement", "review"]

[prompt_capabilities.user_journey_comparison]
authority = "behavioral"
allowed_phases = ["review"]
requires = ["playwright_exploration"]

[prompt_packs.default]
base_system = "base/system.md"

[prompt_packs.default.roles]
design = "roles/design.md"
plan = "roles/plan.md"
implement = "roles/implement.md"
review = "roles/review.md"
merge = "roles/merge.md"

[prompt_packs.default.phases]
implement = "phases/implement.md"
review = "phases/review.md"

[prompt_packs.default.capabilities]
"github.read_pr" = "capabilities/github-read-pr.md"
"github.push_branch" = "capabilities/github-push-branch.md"
"github.create_pr" = "capabilities/github-create-pr.md"
"github.reply_review_thread" = "capabilities/github-reply-review-thread.md"
"github.resolve_review_thread" = "capabilities/github-resolve-review-thread.md"
"github.write_review" = "capabilities/github-write-review.md"
playwright_exploration = "capabilities/playwright-exploration.md"
user_journey_comparison = "capabilities/user-journey-comparison.md"

[prompt_packs.default.overlays.organization]
reviewer_qa = "overlays/org/reviewer-qa.md"

[prompt_packs.default.overlays.project]
reviewer_webapp = "overlays/project/reviewer-webapp.md"

[prompt_packs.default.experiments]
reviewer_v2 = "experiments/reviewer-v2.md"
reviewer_playwright_heavy = "experiments/reviewer-playwright-heavy.md"

[providers.linear_main]
kind = "planning.linear"
token_env = "LINEAR_API_KEY"
team = "ENG"
project = "Orqestrate Build" # optional: scope work to a single Linear project
webhook_signing_secret_env = "LINEAR_WEBHOOK_SECRET"

[providers.notion_main]
kind = "context.notion"
token_env = "NOTION_TOKEN"
artifacts_database_id = "replace-me"
runs_database_id = "replace-me"

[providers.local_planning]
kind = "planning.local_files"
root = ".harness/local/planning"

[providers.local_context]
kind = "context.local_files"
root = ".harness/local/context"

#[providers.asana_main]
#kind = "planning.asana"
#token_env = "ASANA_API_KEY"
#workspace_gid = "replace-me"
#project_gid = "replace-me"

#[providers.drive_main]
#kind = "context.google_drive"
#credentials_path = "~/.config/harness/gdrive-service-account.json"
#artifacts_folder_id = "replace-me"
#runs_folder_id = "replace-me"

[profiles.saas]
planning = "linear_main"
context = "notion_main"
prompt_pack = "default"

[profiles.saas.prompt]
organization_overlays = ["reviewer_qa"]
project_overlays = ["reviewer_webapp"]
default_experiment = "reviewer_v2"

[profiles.local]
planning = "local_planning"
context = "local_context"
prompt_pack = "default"

[profiles.hybrid]
planning = "linear_main"
context = "local_context"
prompt_pack = "default"

[profiles.hybrid.prompt]
organization_overlays = ["reviewer_qa"]
